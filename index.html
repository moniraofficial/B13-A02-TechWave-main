<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B13-A02-TechWave-main</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
  <div class="navbar__container">
    <div class="navbar__content">
      
      <div class="navbar__logo-wrapper">
        <a href="#" class="navbar__logo">
          Tech<span class="text-gradient">Wave</span>
        </a>
      </div>

      <div class="navbar__links desktop-only">
        <a href="#" class="navbar__link">About</a>
        <a href="#" class="navbar__link">Episodes</a>
        <a href="#" class="navbar__link">Host</a>
      </div>

      <div class="desktop-only">
        <button class="btn-primary">
          Subscribe
          <svg xmlns="http://www.w3.org/2000/svg" class="btn-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
          </svg>
        </button>
      </div>

      <label for="menu-toggle" class="mobile-menu-btn lg-hidden">
        <svg class="icon-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-16 6h16"></path>
        </svg>
      </label>
      <input type="checkbox" id="menu-toggle" class="menu-checkbox">

      <div class="navbar__mobile-menu">
        <a href="#" class="navbar__mobile-link">About</a>
        <a href="#" class="navbar__mobile-link">Episodes</a>
        <a href="#" class="navbar__mobile-link">Host</a>
        <button class="btn-primary">Subscribe</button>
      </div>

    </div>
  </div>
</nav>

<!-- Banner -->
 <section class="hero">
  <div class="waves-bg"></div>

  <div class="hero-content">
    <div class="mic-container">
      <span class="badge-new">NEW</span>
      <div class="gradient-circle">
        <img src="./assets/microphone.png" alt="Mic" class="mic-icon">
      </div>
    </div>

     <h1 class="main-title">TechWave</h1>
    <p class="hero-text">Your daily dose of tech insights, productivity hacks, and personal growth</p>

    <div class="button-group">
      <a href="#" class="btn-gradient"><span><img src="./assets/spotify.png" alt=""></span> Listen On Spotify</a>
      <a href="#" class="btn-outline"><span><img src="./assets/message.png" alt=""></span> Subscribe</a>
    </div>
  </div>
</section>

</body>
</html>
